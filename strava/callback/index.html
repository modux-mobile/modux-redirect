<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting to MODUX...</title>
  <style>
    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
  </style>
</head>
<body>
  <p id="msg">Redirecting to MODUX...</p>
  <script>
    var params = new URLSearchParams(window.location.search);
    var code = params.get("code");
    if (code) {
      window.location.href = "modux://strava-callback?code=" + encodeURIComponent(code);
    } else {
      document.getElementById("msg").textContent = "Missing authorization code.";
    }
  </script>
</body>
</html>
